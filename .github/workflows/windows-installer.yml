name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version for installer (example: 1.0.0)"
        required: true
        default: "1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "${{ inputs.version }}"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Using version: $version"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Prepare bundled tools
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force tools | Out-Null

          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "tools\yt-dlp.exe"

          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg" -Force

          $ffmpeg = Get-ChildItem -Path "ffmpeg" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffprobe = Get-ChildItem -Path "ffmpeg" -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) {
            throw "ffmpeg.exe or ffprobe.exe not found after archive extraction."
          }

          Copy-Item $ffmpeg.FullName "tools\ffmpeg.exe" -Force
          Copy-Item $ffprobe.FullName "tools\ffprobe.exe" -Force

      - name: Build installer
        shell: pwsh
        run: .\scripts\build_windows.ps1 -Clean -CreateInstaller -Version "${{ steps.meta.outputs.version }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoTranscriber-Setup-${{ steps.meta.outputs.version }}
          path: VideoTranscriber-Setup.exe

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoTranscriber-Portable-${{ steps.meta.outputs.version }}
          path: dist/VideoTranscriber/**

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: VideoTranscriber-Setup.exe
