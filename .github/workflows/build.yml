name: Build Apps

on:
  push:
    tags:
      - "v*"
permissions:
  contents: write 
jobs:

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ffmpeg орнату
        run: brew install ffmpeg yt-dlp

      - name: Кітапханалар орнату
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: App жинау
        run: |
          pyinstaller --noconfirm \
            --windowed \
            --onedir \
            --name "VideoTranscriber" \
            --add-data "$(python -c 'import customtkinter, os; print(os.path.dirname(customtkinter.__file__))'):customtkinter" \
            --collect-data "whisper" \
            --hidden-import "whisper" \
            --hidden-import "torch" \
            main.py

      - name: CLI tools-ты app ішіне қосу
        run: |
          mkdir -p dist/VideoTranscriber/tools
          cp -L "$(command -v ffmpeg)" dist/VideoTranscriber/tools/ffmpeg
          cp -L "$(command -v ffprobe)" dist/VideoTranscriber/tools/ffprobe
          cp -L "$(command -v yt-dlp)" dist/VideoTranscriber/tools/yt-dlp

      - name: DMG жасау
        run: |
          brew install create-dmg
          create-dmg \
            --volname "VideoTranscriber" \
            --window-size 600 400 \
            --icon-size 128 \
            --app-drop-link 400 200 \
            "VideoTranscriber-mac.dmg" \
            "dist/VideoTranscriber/"

      - uses: softprops/action-gh-release@v2
        with:
          files: VideoTranscriber-mac.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ffmpeg орнату
        run: |
          choco install ffmpeg -y
          choco install yt-dlp -y

      - name: Кітапханалар орнату
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: App жинау
        run: |
          $ctk = python -c "import customtkinter, os; print(os.path.dirname(customtkinter.__file__))"
          pyinstaller --noconfirm `
            --windowed `
            --onedir `
            --name "VideoTranscriber" `
            --add-data "$ctk;customtkinter" `
            --collect-data "whisper" `
            --hidden-import "whisper" `
            --hidden-import "torch" `
            main.py

      - name: CLI tools-ты app ішіне қосу
        shell: powershell
        run: |
          $toolsDir = "dist\VideoTranscriber\tools"
          New-Item -ItemType Directory -Force -Path $toolsDir | Out-Null

          $ffmpegExe = Get-ChildItem "C:\ProgramData\chocolatey\lib\ffmpeg*\tools" -Recurse -Filter ffmpeg.exe | Select-Object -First 1 -ExpandProperty FullName
          $ffprobeExe = Get-ChildItem "C:\ProgramData\chocolatey\lib\ffmpeg*\tools" -Recurse -Filter ffprobe.exe | Select-Object -First 1 -ExpandProperty FullName
          $ytdlpExe = Get-ChildItem "C:\ProgramData\chocolatey\lib\yt-dlp*\tools" -Recurse -Filter yt-dlp.exe | Select-Object -First 1 -ExpandProperty FullName

          if (-not $ffmpegExe -or -not $ffprobeExe -or -not $ytdlpExe) {
            throw "Bundled CLI tools табылмады (ffmpeg/ffprobe/yt-dlp)."
          }

          Copy-Item $ffmpegExe "$toolsDir\ffmpeg.exe" -Force
          Copy-Item $ffprobeExe "$toolsDir\ffprobe.exe" -Force
          Copy-Item $ytdlpExe "$toolsDir\yt-dlp.exe" -Force

      - name: Inno Setup орнату
        run: choco install innosetup -y

      - name: Windows Installer жасау (.exe)
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          iscc /DMyAppVersion=$version .github\installer\VideoTranscriber.iss

      - uses: softprops/action-gh-release@v2
        with:
          files: VideoTranscriber-Setup.exe
